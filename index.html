<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Quiniela Mundial 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

:root {
  --bg:      #0a0c10;
  --surface: #111419;
  --card:    #161b23;
  --border:  #1f2733;
  --gold:    #f5c842;
  --silver:  #b0bec5;
  --bronze:  #cd7f32;
  --green:   #00e676;
  --blue:    #4fc3f7;
  --muted:   #546e7a;
  --text:    #e8edf2;
  --dim:     #8a9ab0;
  --accent:  #ff5722;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:linear-gradient(160deg,#0d1520 0%,#0a0c10 60%);border-bottom:1px solid var(--border);padding:22px 20px 18px;text-align:center}
.eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:6px;opacity:.8}
h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(30px,7vw,52px);font-weight:900;line-height:1;color:var(--text)}
h1 span{color:var(--gold)}
.meta{margin-top:10px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:4px 11px;font-size:12px;color:var(--dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.dot.live{background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
.wrap{max-width:1060px;margin:0 auto;padding:20px 14px 50px;display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
@media(max-width:800px){.wrap{grid-template-columns:1fr}}
.eyebrow-sm{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-left:2px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 12px;border-bottom:1px solid var(--border)}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800}

/* LEADERBOARD */
.lb-cols{display:grid;grid-template-columns:40px 1fr 50px 50px 50px;padding:6px 18px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
.lb-cols span:nth-child(n+3){text-align:right}
.lb-row{display:grid;grid-template-columns:40px 1fr 50px 50px 50px;align-items:center;padding:9px 18px;border-bottom:1px solid var(--border);transition:background .15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,.025)}
.lb-row.r1{background:rgba(245,200,66,.04)}
.lb-row.r2{background:rgba(176,190,197,.03)}
.lb-row.r3{background:rgba(205,127,50,.03)}
.rank{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:var(--muted)}
.rank.g{color:var(--gold)}.rank.s{color:var(--silver)}.rank.b{color:var(--bronze)}
.name-wrap{min-width:0; padding-right:10px;}
.name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.bar-bg{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.bar{height:100%;background:var(--green);border-radius:2px;width:0;transition:width 1s cubic-bezier(.4,0,.2,1)}
.r1 .bar{background:var(--gold)}.r2 .bar{background:var(--silver)}.r3 .bar{background:var(--bronze)}
.pts{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;text-align:right;line-height:1}
.r1 .pts{color:var(--gold)}
.sub{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--dim);text-align:right}

/* MATCHES */
.tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:3px}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:4px 9px;border-radius:5px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:background .15s,color .15s}
.tab.on{background:var(--border);color:var(--text)}
.match{padding:11px 16px;border-bottom:1px solid var(--border)}
.match:last-child{border-bottom:none}
.match:hover{background:rgba(255,255,255,.02)}
.match-meta{display:flex;justify-content:space-between;margin-bottom:7px}
.grp-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 6px}
.mt{font-size:11px;color:var(--dim)}
.mt.live-t{color:var(--accent);font-weight:600;animation:pulse 1.5s infinite}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.team{display:flex;align-items:center;gap:5px}
.team.away{flex-direction:row-reverse}
.fl{font-size:17px;line-height:1;flex-shrink:0}
.tn{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:95px}
.team.away .tn{text-align:right}
.score{display:flex;align-items:center;gap:3px;flex-shrink:0}
.sc{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;width:20px;text-align:center;line-height:1}
.sep{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--muted)}
.vs{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;padding:0 4px}

/* STANDINGS */
.grp-sel{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;padding:4px 8px;cursor:pointer;outline:none}
.grp-sel option{background:var(--card)}
.std-table{width:100%;border-collapse:collapse}
.std-table thead tr{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.std-table th,.std-table td{padding:7px 10px;text-align:center}
.std-table th:first-child,.std-table td:first-child{text-align:left;padding-left:16px}
.std-table td{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--dim)}
.std-table td:first-child{font-weight:700;color:var(--text)}
.std-table tbody tr{border-top:1px solid var(--border)}
.std-table tbody tr:hover{background:rgba(255,255,255,.02)}
.ptd{font-weight:900!important;color:var(--text)!important}
.qdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle;margin-bottom:1px}
.qdot.maybe{background:var(--blue)}
.legend{padding:7px 16px 10px;font-size:11px;color:var(--muted);display:flex;gap:12px}

/* STATES */
.err{padding:18px;text-align:center;color:var(--muted);font-size:12px;line-height:1.6}
</style>
</head>
<body>

<header>
  <div class="eyebrow">Quiniela Familia Lopez Félix — Temporada 2026</div>
  <h1>MUNDIAL <span>2026</span></h1>
  <div class="meta">
    <div class="pill" id="btnRefresh" style="cursor:pointer;" title="Sincronizar manualmente">
      <div class="dot live" id="sDot"></div>
      <span id="sStatus">Cargando…</span>
    </div>
    <div class="pill"><span>📅</span><span id="sDate">—</span></div>
    <div class="pill"><span>👥</span><span id="sPlayers">— participantes</span></div>
  </div>
</header>

<div class="wrap">
  <div>
    <div class="eyebrow-sm">Leaderboard</div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">🏆 Clasificación</span>
        <span id="lbTime" style="font-size:11px;color:var(--muted)">—</span>
      </div>
      <div class="lb-cols">
        <span>#</span><span>Participante</span>
        <span>Grupos</span><span>Partidos</span><span>Total</span>
      </div>
      <div id="lbBody"><div class="err" style="padding:14px;color:var(--muted);font-size:12px">⏳ Conectando con Google Sheets sin intermediarios…</div></div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:18px">
    <div>
      <div class="eyebrow-sm">Partidos del Mundial</div>
      <div class="card">
        <div class="card-head">
          <span class="card-title">⚽ Partidos</span>
          <div class="tabs">
            <button class="tab on" id="tR" onclick="setTab('r')">Recientes</button>
            <button class="tab" id="tU" onclick="setTab('u')">Próximos</button>
          </div>
        </div>
        <div id="mBody"></div>
      </div>
    </div>
    <div>
      <div class="eyebrow-sm">Posiciones de Grupo</div>
      <div class="card">
        <div class="card-head">
          <span class="card-title">Grupo</span>
          <select class="grp-sel" id="gSel" onchange="renderStd()">
            <option>A</option><option>B</option><option>C</option><option>D</option>
            <option>E</option><option>F</option><option>G</option><option>H</option>
            <option>I</option><option>J</option><option>K</option><option>L</option>
          </select>
        </div>
        <div id="stdBody"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SID = '1Lxz_7Hf20m685XGDQQmNFL0IclDY8RzK0IXIo0jnZg4';
const GID_LEADERBOARD = '1369482165';
const GID_RESULTADOS = '1369482165'; 
const REFRESH = 5 * 60 * 1000; // Auto-actualizar cada 5 minutos

function getDirectCsvUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&gid=${gid}`;
}

async function fetchCSV(gid) {
  const r = await fetch(getDirectCsvUrl(gid));
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const text = await r.text();
  return parseCSV(text);
}

// ── GROUPS DATA ─────────────────────────────────────────
const GROUPS = {
  A:['México','Corea del Sur','Sudáfrica','Chequia'],
  B:['Canadá','Suiza','Bosnia y H.','Catar'],
  C:['Brasil','Marruecos','Escocia','Haití'],
  D:['Estados Unidos','Paraguay','Turquía','Australia'],
  E:['Alemania','Ecuador','Curazao','Costa de Marfil'],
  F:['Países Bajos','Japón','Suecia','Túnez'],
  G:['Bélgica','Egipto','Irán','Nueva Zelanda'],
  H:['España','Cabo Verde','Arabia Saudita','Uruguay'],
  I:['Francia','Senegal','Noruega','Irak'],
  J:['Argentina','Austria','Argelia','Jordania'],
  K:['Portugal','Colombia','RD Congo','Uzbekistán'],
  L:['Inglaterra','Croacia','Ghana','Panamá'],
};

const F = {
  'México':'🇲🇽','Corea del Sur':'🇰🇷','Sudáfrica':'🇿🇦','Chequia':'🇨🇿',
  'Canadá':'🇨🇦','Suiza':'🇨🇭','Bosnia y H.':'🇧🇦','Catar':'🇶🇦',
  'Brasil':'🇧🇷','Marruecos':'🇲🇦','Escocia':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Haití':'🇭🇹',
  'Turquía':'🇹🇷','Estados Unidos':'🇺🇸','Australia':'🇦🇺','Paraguay':'🇵🇾',
  'Alemania':'🇩🇪','Ecuador':'🇪🇨','Curazao':'🇨🇼','Costa de Marfil':'🇨🇮',
  'Japón':'🇯🇵','Suecia':'🇸🇪','Países Bajos':'🇳🇱','Túnez':'🇹🇳',
  'Bélgica':'🇧🇪','Egipto':'🇪🇬','Irán':'🇮🇷','Nueva Zelanda':'🇳🇿',
  'España':'🇪🇸','Cabo Verde':'🇨🇻','Arabia Saudita':'🇸🇦','Uruguay':'🇺🇾',
  'Francia':'🇫🇷','Senegal':'🇸🇳','Noruega':'🇳🇴','Irak':'🇮🇶',
  'Argentina':'🇦🇷','Austria':'🇦🇹','Argelia':'🇩🇿','Jordania':'🇯🇴',
  'Portugal':'🇵🇹','Colombia':'🇨🇴','RD Congo':'🇨🇩','Uzbekistán':'🇺🇿',
  'Inglaterra':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croacia':'🇭🇷','Ghana':'🇬🇭','Panamá':'🇵🇦',
};
const fl = n => F[n] || '🏳️';

let matches = [];        
let grpResults = {};     
let curTab = 'r';

// ── CSV PARSER PROTEGIDO ────────────────────────────────
function parseCSV(txt) {
  const rows = [];
  const lines = txt.split(/\r?\n/);
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line || /^,+$/.test(line)) continue;
    
    if (!line.includes('"')) {
      rows.push(line.split(',').map(v => v.trim()));
      continue;
    }
    
    const row = [];
    let c = 0;
    while (c < line.length) {
      if (line[c] === '"') {
        let end = line.indexOf('"', c + 1);
        while (end !== -1 && line[end + 1] === '"') { 
          end = line.indexOf('"', end + 2);
        }
        if (end === -1) end = line.length;
        row.push(line.substring(c + 1, end).replace(/""/g, '"').trim());
        c = end + 2; 
      } else {
        let nextComma = line.indexOf(',', c);
        if (nextComma === -1) nextComma = line.length;
        row.push(line.substring(c, nextComma).trim());
        c = nextComma + 1;
      }
    }
    rows.push(row);
  }
  return rows;
}

// ── PROCESS DATA ─────────────────────────────────────────
function processLB(rows) {
  let hdr = -1;
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].some(c => /participante/i.test(c))) { hdr = i; break; }
  }
  if (hdr < 0) throw new Error('Falta la cabecera en Leaderboard');

  const players = [];
  for (let i = hdr + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 2) continue;
    
    const col0 = (row[0] || '');
    const col1 = (row[1] || '');

    if (col0.includes('📋') || col1.includes('📋') || /pts\s*\//.test(col1)) break;
    if (!col0 && !col1) continue;

    const name = col1.replace(/^[\u{1F947}\u{1F948}\u{1F949}\u{1F3C5}🥇🥈🥉🏅]+/gu, '').trim();
    if (!name) continue;

    const total  = parseFloat(row[2]) || 0;
    const grupos = parseFloat(row[4]) || 0;
    const pPartidos = row[12] !== undefined ? parseFloat(row[12]) : 0;

    players.push({ name, total, grupos, pPartidos });
  }

  const sPlayers = document.getElementById('sPlayers');
  if (sPlayers) sPlayers.textContent = `${players.length} participante${players.length !== 1 ? 's' : ''}`;
  
  const lbTime = document.getElementById('lbTime');
  if (lbTime) lbTime.textContent = 'Act. ' + new Date().toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});

  const max = players.length ? Math.max(...players.map(p => p.total)) : 1;
  const body = document.getElementById('lbBody');

  if (!players.length) {
    if (body) body.innerHTML = '<div class="err">Sin participantes aún</div>'; 
    return;
  }

  if (body) {
    body.innerHTML = players.map((p, i) => {
      const rank = i + 1;
      const cls  = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
      const rc   = rank===1?'g':rank===2?'s':rank===3?'b':'';
      const em   = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
      const pct  = max > 0 ? (p.total / max * 100).toFixed(1) : 0;
      
      return `<div class="lb-row ${cls}" data-pct="${pct}">
        <div class="rank ${rc}">${em || rank}</div>
        <div class="name-wrap">
          <div class="name">${p.name}</div>
          <div class="bar-bg"><div class="bar"></div></div>
        </div>
        <div class="sub">${p.grupos > 0 ? p.grupos : '—'}</div>
        <div class="sub">${p.pPartidos > 0 ? p.pPartidos : '—'}</div>
        <div class="pts">${p.total}</div>
      </div>`;
    }).join('');

    requestAnimationFrame(() => {
      document.querySelectorAll('.lb-row').forEach(r => {
        const bar = r.querySelector('.bar');
        if (bar) bar.style.width = r.dataset.pct + '%';
      });
    });
  }
}

function processResultados(rows) {
  grpResults = {};
  const ms = [];

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row[0]) continue;
    const col0 = row[0].trim();
    
    const mGroup = col0.match(/^G-([A-L])-?(\d)$/i);
    if (mGroup && row[1] && row[1].trim()) {
      const g = mGroup[1].toUpperCase(), pos = parseInt(mGroup[2]) - 1;
      if (!grpResults[g]) grpResults[g] = [null,null,null,null];
      grpResults[g][pos] = row[1].trim();
    }

    const mMatch = col0.match(/^\[([A-L])\]\s+(.+?)\s+vs\s+(.+)$/i);
    if (mMatch) {
      const sH = (row[1] !== undefined && row[1] !== '' && !row[1].includes('⏳')) ? parseInt(row[1]) : null;
      const sA = (row[2] !== undefined && row[2] !== '' && !row[2].includes('⏳')) ? parseInt(row[2]) : null;
      
      let st = 'SCHED';
      if (row[3] && row[3].includes('✅')) st = 'FIN';
      else if (row[3] && row[3].includes('🔴')) st = 'LIVE';
      else if (sH !== null && sA !== null) st = 'FIN';

      ms.push({ g: mMatch[1].toUpperCase(), h: mMatch[2].trim(), a: mMatch[3].trim(), sH, sA, st });
    }
  }

  matches = ms;
  renderMatches();
  renderStd();
}

// ── RENDERS SÍNCRO ───────────────────────────────────────
function setTab(t) {
  curTab = t;
  const tR = document.getElementById('tR');
  const tU = document.getElementById('tU');
  if (tR) tR.classList.toggle('on', t==='r');
  if (tU) tU.classList.toggle('on', t==='u');
  renderMatches();
}

function renderMatches() {
  const body = document.getElementById('mBody');
  if (!body) return;

  let list = curTab === 'r'
    ? matches.filter(m => m.st === 'FIN' || m.st === 'LIVE').slice(-8).reverse() 
    : matches.filter(m => m.st === 'SCHED').slice(0, 8); 

  if (!list.length) {
    body.innerHTML = `<div class="err">${curTab==='r' ? '⏳ El torneo o partidos en vivo aún no han comenzado' : '📅 No hay próximos partidos programados'}</div>`;
    return;
  }
  body.innerHTML = list.map(m => matchHTML(m)).join('');
}

function matchHTML(m) {
  const isLive = m.st === 'LIVE';
  const hasSc  = m.sH !== null && m.sA !== null;
  const time   = m.st === 'FIN' ? 'Finalizado' : isLive ? '⚡ EN VIVO' : '⏳ Por jugar';
  
  const scoreBlock = hasSc
    ? `<div class="score"><span class="sc">${m.sH}</span><span class="sep">–</span><span class="sc">${m.sA}</span></div>`
    : `<span class="vs">VS</span>`;
    
  return `<div class="match">
    <div class="match-meta">
      <span class="grp-tag">Grupo ${m.g}</span>
      <span class="mt ${isLive?'live-t':''}">${time}</span>
    </div>
    <div class="teams">
      <div class="team"><span class="fl">${fl(m.h)}</span><span class="tn">${m.h}</span></div>
      ${scoreBlock}
      <div class="team away"><span class="fl">${fl(m.a)}</span><span class="tn">${m.a}</span></div>
    </div>
  </div>`;
}

function renderStd() {
  const body = document.getElementById('stdBody');
  if (!body) return;

  const gSel = document.getElementById('gSel');
  const g = gSel ? gSel.value : 'A';
  const res  = grpResults[g] || [];
  const base = GROUPS[g] || [];

  const rows = [0,1,2,3].map(i => ({
    team: res[i] || base[i] || '?',
    known: !!res[i],
  }));

  body.innerHTML = `
    <table class="std-table">
      <thead><tr><th>#</th><th>Equipo</th><th>PJ</th><th>Pts</th></tr></thead>
      <tbody>${rows.map((r,i) => {
        const dot = i<2 ? `<span class="qdot"></span>` : i===2 ? `<span class="qdot maybe"></span>` : '';
        return `<tr>
          <td style="font-size:13px;color:var(--muted)">${i+1}</td>
          <td><span>${fl(r.team)}</span> ${dot}<span style="font-weight:700">${r.team}</span></td>
          <td>${r.known?'3':'0'}</td>
          <td class="ptd">${r.known?(i===0?'9':i===1?'6':i===2?'3':'0'):'0'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
    <div class="legend">
      <span><span class="qdot" style="display:inline-block"></span>Clasifica</span>
      <span><span class="qdot maybe" style="display:inline-block"></span>Posible 3ro</span>
    </div>`;
}

function updateHeader() {
  const sDate = document.getElementById('sDate');
  if (sDate) {
    sDate.textContent = new Date().toLocaleDateString('es-MX', {weekday:'short',day:'numeric',month:'long'});
  }
}

// ── OPERACIÓN ASÍNCRONA BULLETPROOF ──────────────────────
async function run() {
  const sDot = document.getElementById('sDot');
  const sStatus = document.getElementById('sStatus');
  const lbBody = document.getElementById('lbBody');

  if (sDot) sDot.classList.remove('live');
  if (sStatus) sStatus.textContent = 'Actualizando…';

  try {
    if (GID_LEADERBOARD === GID_RESULTADOS) {
      const uniqueRows = await fetchCSV(GID_LEADERBOARD);
      processLB(uniqueRows);
      processResultados(uniqueRows);
    } else {
      const [rowsLB, rowsRes] = await Promise.all([
        fetchCSV(GID_LEADERBOARD),
        fetchCSV(GID_RESULTADOS)
      ]);
      processLB(rowsLB);
      processResultados(rowsRes);
    }
    
    if (sStatus) sStatus.textContent = 'Sincronizado';
    if (sDot) sDot.classList.add('live');
  } catch(e) {
    console.error(e);
    if (sStatus) sStatus.textContent = 'Error de Conexión';
    if (lbBody) {
      lbBody.innerHTML = `
        <div class="err">⚠️ Error al conectar con Google Sheets.<br>
        <small>Verifica que el archivo esté compartido como <b>Público (Cualquier persona con el enlace puede leer)</b>.<br>
        Detalle técnico: ${e.message}</small></div>`;
    }
  }
}

// ── DETECTOR DE CONTROL DE CARGA (ANTI-CACHÉ PLUGINS) ───
function initQuiniela() {
  updateHeader();
  run();
  setInterval(run, REFRESH);

  const btnRefresh = document.getElementById('btnRefresh');
  if (btnRefresh) {
    btnRefresh.addEventListener('click', run);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initQuiniela);
} else {
  initQuiniela();
}
</script>
</body>
