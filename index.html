// Actualizado para atrapar variaciones en los nombres de Chequia y Bosnia

// ── 1. GENERADOR DE CALENDARIO DE RESPALDO ──
function generateFallbackMatches() {
  const generated = [];
  const letters = Object.keys(GROUPS);
  
  letters.forEach((letter, index) => {
    const teams = GROUPS[letter];
    const dayOffset = Math.floor(index / 2); 
    const baseDate = new Date('2026-06-11T14:00:00Z'); 
    baseDate.setDate(baseDate.getDate() + dayOffset);
    
    const d1 = new Date(baseDate); d1.setUTCHours(15 + (index % 2) * 3, 0, 0);
    generated.push({ g: letter, h: teams[0], a: teams[1], sH: null, sA: null, st: 'SCHED', date: d1 });
    
    const d2 = new Date(baseDate); d2.setUTCHours(18 + (index % 2) * 3, 0, 0);
    generated.push({ g: letter, h: teams[2], a: teams[3], sH: null, sA: null, st: 'SCHED', date: d2 });
  });
  
  matches = generated.sort((a, b) => a.date - b.date);
}

// ── 2. CARGA DEL LEADERBOARD ────────
function getDirectCsvUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&gid=${gid}`;
}

async function fetchLeaderboard() {
  const r = await fetch(getDirectCsvUrl(GID_LEADERBOARD));
  if (!r.ok) throw new Error('Error Sheets');
  const text = await r.text();
  const rows = parseCSV(text);
  processLB(rows);
}

function parseCSV(txt) {
  const rows = [];
  const lines = txt.split(/\r?\n/);
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line || /^,+$/.test(line)) continue;
    if (!line.includes('"')) { rows.push(line.split(',').map(v => v.trim())); continue; }
    const row = []; let c = 0;
    while (c < line.length) {
      if (line[c] === '"') {
        let end = line.indexOf('"', c + 1);
        while (end !== -1 && line[end + 1] === '"') end = line.indexOf('"', end + 2);
        if (end === -1) end = line.length;
        row.push(line.substring(c + 1, end).replace(/""/g, '"').trim());
        c = end + 2; 
      } else {
        let nextComma = line.indexOf(',', c);
        if (nextComma === -1) nextComma = line.length;
        row.push(line.substring(c, nextComma).trim());
        c = nextComma + 1;
      }
    }
    rows.push(row);
  }
  return rows;
}

function processLB(rows) {
  let hdr = -1;
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].some(c => /participante/i.test(c))) { hdr = i; break; }
  }
  const players = [];
  if (hdr >= 0) {
    for (let i = hdr + 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length < 2) continue;
      const col1 = (row[1] || '');
      if (row[0].includes('📋') || col1.includes('📋') || /pts\s*\//.test(col1)) break;
      const name = col1.replace(/^[\u{1F947}\u{1F948}\u{1F949}\u{1F3C5}🥇🥈🥉🏅]+/gu, '').trim();
      if (!name) continue;
      players.push({
        name, 
        total: parseFloat(row[2]) || 0, 
        grupos: parseFloat(row[4]) || 0, 
        pPartidos: row[12] !== undefined ? parseFloat(row[12]) : 0
      });
    }
  }

  const sPlayers = document.getElementById('sPlayers');
  if (sPlayers) sPlayers.textContent = `${players.length} participante${players.length !== 1 ? 's' : ''}`;
  
  // Forzar zona horaria de CDMX para la hora de actualización
  const lbTime = document.getElementById('lbTime');
  if (lbTime) {
    const cdmxTime = new Date().toLocaleTimeString('es-MX', { timeZone: 'America/Mexico_City', hour:'2-digit', minute:'2-digit', hour12: true });
    lbTime.textContent = 'Act: ' + cdmxTime + ' (CDMX)';
  }

  const body = document.getElementById('lbBody');

  if (body) {
    const totalPool = players.length * 400;
    const p1 = totalPool * 0.50;
    const p2 = totalPool * 0.30;
    const p3 = totalPool * 0.20;

    let prizeBox = document.getElementById('prizeBoxAuto');
    if (!prizeBox) {
      prizeBox = document.createElement('div');
      prizeBox.id = 'prizeBoxAuto';
      prizeBox.style.cssText = "margin: 0 auto 24px auto; font-size: 14px; background: rgba(255,255,255,0.06); padding: 16px; border-radius: 12px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; max-width: 500px; width: 100%; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.2);";
      const lbContainer = body.closest('.card') || body;
      if (lbContainer && lbContainer.parentNode) lbContainer.parentNode.insertBefore(prizeBox, lbContainer);
    }
    prizeBox.innerHTML = `
      <div style="grid-column: span 3; font-weight: bold; color: #ffd700; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 4px;">💰 Bolsa Total: $${totalPool.toLocaleString('es-MX')} MXN</div>
      <div><div style="font-size:16px;">🥇</div><span style="font-size:11px;color:#aaa">1º (50%)</span><br><strong style="color:#fff; font-size:14px;">$${p1.toLocaleString('es-MX')}</strong></div>
      <div><div style="font-size:16px;">🥈</div><span style="font-size:11px;color:#aaa">2º (30%)</span><br><strong style="color:#fff; font-size:14px;">$${p2.toLocaleString('es-MX')}</strong></div>
      <div><div style="font-size:16px;">🥉</div><span style="font-size:11px;color:#aaa">3º (20%)</span><br><strong style="color:#fff; font-size:14px;">$${p3.toLocaleString('es-MX')}</strong></div>
    `;
  }

  const max = players.length ? Math.max(...players.map(p => p.total)) : 1;
  if (!players.length) {
    if (body) body.innerHTML = '<div class="err">No hay participantes.</div>'; return;
  }

  if (body) {
    body.innerHTML = players.map((p, i) => {
      const rank = i + 1;
      const cls = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
      const rc = rank===1?'g':rank===2?'s':rank===3?'b':'';
      const em = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
      const pct = max > 0 ? (p.total / max * 100).toFixed(1) : 0;
      return `<div class="lb-row ${cls}" data-pct="${pct}">
        <div class="rank ${rc}">${em || rank}</div>
        <div class="name-wrap">
          <div class="name">${p.name}</div>
          <div class="bar-bg"><div class="bar"></div></div>
        </div>
        <div class="sub">${p.grupos > 0 ? p.grupos : '—'}</div>
        <div class="sub">${p.pPartidos > 0 ? p.pPartidos : '—'}</div>
        <div class="pts">${p.total}</div>
      </div>`;
    }).join('');
    requestAnimationFrame(() => {
      document.querySelectorAll('.lb-row').forEach(r => {
        const bar = r.querySelector('.bar');
        if (bar) bar.style.width = r.dataset.pct + '%';
      });
    });
  }
}

// ── 3. CONEXIÓN API / FALLBACK AUTOMÁTICO ──────────────
async function fetchAPI() {
  try {
    const opts = { headers: { 'X-Auth-Token': API_TOKEN } };
    const resM = await fetch(API_URL_MATCHES, opts);
    
    if (!resM.ok) throw new Error('API en espera');
    const dataM = await resM.json();
    
    if (dataM.matches && dataM.matches.length > 0) {
      matches = dataM.matches.map(m => {
        let st = 'SCHED';
        if (m.status === 'FINISHED') st = 'FIN';
        if (m.status === 'IN_PLAY' || m.status === 'PAUSED') st = 'LIVE';
        
        let groupLetter = '?';
        if (m.group && m.group.includes('GROUP_')) {
          groupLetter = m.group.split('_')[1];
        }

        return {
          g: groupLetter,
          h: tr(m.homeTeam?.name),
          a: tr(m.awayTeam?.name),
          sH: m.score?.fullTime?.home !== undefined ? m.score.fullTime.home : null,
          sA: m.score?.fullTime?.away !== undefined ? m.score.fullTime.away : null,
          st: st,
          date: new Date(m.utcDate)
        };
      });
    } else {
      generateFallbackMatches();
    }

    const resS = await fetch(API_URL_STANDINGS, opts);
    if (resS.ok) {
      const dataS = await resS.json();
      grpResults = {};
      if (dataS.standings) {
        dataS.standings.forEach(std => {
          if (std.type === 'TOTAL' && std.group) {
            const gL = std.group.split('_')[1]; 
            grpResults[gL] = std.table.map(t => ({
              team: tr(t.team.name),
              pts: t.points,
              pj: t.playedGames
            }));
          }
        });
      }
    }
  } catch(e) {
    generateFallbackMatches();
  }
  renderMatches();
  renderStd();
}

// ── 4. RENDERIZADO DE COMPONENTES ───────────────────────
function setTab(t) {
  curTab = t;
  const tR = document.getElementById('tR');
  const tU = document.getElementById('tU');
  if (tR) tR.classList.toggle('on', t==='r');
  if (tU) tU.classList.toggle('on', t==='u');
  renderMatches();
}

function renderMatches() {
  const body = document.getElementById('mBody');
  if (!body) return;

  let list = curTab === 'r'
    ? matches.filter(m => m.st === 'FIN' || m.st === 'LIVE').sort((a,b) => b.date - a.date).slice(0, 8) 
    : matches.filter(m => m.st === 'SCHED').sort((a,b) => a.date - b.date).slice(0, 4); 

  if (!list.length) {
    body.innerHTML = `<div class="err">${curTab==='r' ? '⚽ Ningún partido ha comenzado. ¡La Copa inicia este jueves!' : '📅 No hay más partidos programados.'}</div>`;
    return;
  }
  body.innerHTML = list.map(m => matchHTML(m)).join('');
}

function matchHTML(m) {
  const isLive = m.st === 'LIVE';
  const hasSc  = m.sH !== null && m.sA !== null;
  
  // Forzar zona horaria de CDMX para los partidos
  const cdmxOptionsDate = { timeZone: 'America/Mexico_City', weekday: 'short', day: 'numeric' };
  const cdmxOptionsTime = { timeZone: 'America/Mexico_City', hour: '2-digit', minute: '2-digit', hour12: true };
  
  const dateStr = m.date.toLocaleDateString('es-MX', cdmxOptionsDate);
  const timeStr = m.date.toLocaleTimeString('es-MX', cdmxOptionsTime);
  
  const timeLabel = m.st === 'FIN' ? 'Finalizado' : isLive ? '⚡ EN VIVO' : `⏳ ${dateStr} - ${timeStr} (CDMX)`;
  
  const scoreBlock = hasSc
    ? `<div class="score"><span class="sc">${m.sH}</span><span class="sep">–</span><span class="sc">${m.sA}</span></div>`
    : `<span class="vs">VS</span>`;
    
  return `<div class="match">
    <div class="match-meta">
      <span class="grp-tag">Grupo ${m.g}</span>
      <span class="mt ${isLive?'live-t':''}">${timeLabel}</span>
    </div>
    <div class="teams">
      <div class="team"><span class="fl">${fl(m.h)}</span><span class="tn">${m.h}</span></div>
      ${scoreBlock}
      <div class="team away"><span class="fl">${fl(m.a)}</span><span class="tn">${m.a}</span></div>
    </div>
  </div>`;
}

function renderStd() {
  const body = document.getElementById('stdBody');
  if (!body) return;

  const gSel = document.getElementById('gSel');
  const g = gSel ? gSel.value : 'A';
  const apiData = grpResults[g];
  const baseData = GROUPS[g] || [];

  let rows = [];
  if (apiData && apiData.length > 0) {
    rows = apiData;
  } else {
    rows = baseData.map(team => ({ team: team, pts: 0, pj: 0 }));
  }

  body.innerHTML = `
    <table class="std-table">
      <thead><tr><th>#</th><th>Equipo</th><th>PJ</th><th>Pts</th></tr></thead>
      <tbody>${rows.map((r,i) => {
        const dot = i<2 ? `<span class="qdot"></span>` : i===2 ? `<span class="qdot maybe"></span>` : '';
        return `<tr>
          <td style="font-size:13px;color:var(--muted)">${i+1}</td>
          <td><span>${fl(r.team)}</span> ${dot}<span style="font-weight:700">${r.team}</span></td>
          <td>${r.pj}</td>
          <td class="ptd">${r.pts}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
    <div class="legend">
      <span><span class="qdot" style="display:inline-block"></span>Clasifica</span>
      <span><span class="qdot maybe" style="display:inline-block"></span>Posible 3ro</span>
    </div>`;
}

function updateHeader() {
  const sDate = document.getElementById('sDate');
  // Forzar zona horaria de CDMX para la fecha del encabezado
  if (sDate) sDate.textContent = new Date().toLocaleDateString('es-MX', { timeZone: 'America/Mexico_City', weekday:'short', day:'numeric', month:'long'});
}

// ── 5. CONTROLADOR CENTRAL ──────────────────────────────
async function run() {
  const sDot = document.getElementById('sDot');
  const sStatus = document.getElementById('sStatus');
  if (sDot) sDot.classList.remove('live');
  if (sStatus) sStatus.textContent = 'Actualizando…';

  await Promise.allSettled([
    fetchLeaderboard(),
    fetchAPI()
  ]);

  if (sStatus) sStatus.textContent = 'Sincronizado';
  if (sDot) sDot.classList.add('live');
}

function init() {
  updateHeader();
  run();
  setInterval(run, REFRESH_INTERVAL);
  
  const btnRefresh = document.getElementById('btnRefresh');
  if (btnRefresh) btnRefresh.addEventListener('click', run);
  
  const gSel = document.getElementById('gSel');
  if (gSel) gSel.addEventListener('change', renderStd);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
